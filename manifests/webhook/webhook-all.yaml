data:
  config.yaml: |
    images:
      clientRegistration: ghcr.io/kagenti/kagenti-extensions/client-registration:latest
      envoyProxy: ghcr.io/kagenti/kagenti-extensions/envoy-with-processor:latest
      proxyInit: ghcr.io/kagenti/kagenti-extensions/proxy-init:latest
      pullPolicy: IfNotPresent
      spiffeHelper: ghcr.io/spiffe/spiffe-helper:0.11.0
    proxy:
      adminPort: 9901
      inboundProxyPort: 15124
      port: 15123
      uid: 1337
    resources:
      clientRegistration:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
      envoyProxy:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi
      proxyInit:
        limits:
          cpu: 10m
          memory: 10Mi
        requests:
          cpu: 10m
          memory: 10Mi
      spiffeHelper:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
    sidecars:
      clientRegistration:
        enabled: true
      envoyProxy:
        enabled: true
      spiffeHelper:
        enabled: true

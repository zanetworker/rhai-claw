# Source: kagenti-webhook-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagenti-webhook-controller-manager
  namespace: kagenti-webhook-system
  labels:
    helm.sh/chart: kagenti-webhook-chart-0.1.0
    app.kubernetes.io/name: kagenti-webhook-chart
    app.kubernetes.io/instance: kagenti-webhook
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kagenti-webhook-chart
      app.kubernetes.io/instance: kagenti-webhook
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: kagenti-webhook-chart
        app.kubernetes.io/instance: kagenti-webhook
        control-plane: controller-manager
    spec:
      serviceAccountName: kagenti-webhook
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: "quay.io/azaalouk/kagenti-webhook:trace-injection"
        imagePullPolicy: Always
        args:
        - --metrics-bind-address=:8443
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        - --enable-client-registration=true
        - --config-path=/etc/kagenti/config.yaml
        - --feature-gates-path=/etc/kagenti/feature-gates/feature-gates.yaml
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
        - name: platform-config
          mountPath: /etc/kagenti
          readOnly: true
        - name: feature-gates
          mountPath: /etc/kagenti/feature-gates
          readOnly: true
      volumes:
      - name: webhook-certs
        secret:
          secretName: kagenti-webhook-webhook-server-cert
      - name: platform-config
        configMap:
          name: kagenti-webhook-defaults
      - name: feature-gates
        configMap:
          name: kagenti-webhook-feature-gates
      terminationGracePeriodSeconds: 10
---
# Source: kagenti-webhook-chart/templates/authbridge-mutatingwebhook.yaml
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kagenti-webhook-authbridge-mutating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: kagenti-webhook-system/kagenti-webhook-serving-cert
webhooks:
- name: inject.kagenti.io
  admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: kagenti-webhook-webhook-service
      namespace: kagenti-webhook-system
      path: /mutate-workloads-authbridge
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  timeoutSeconds: 10
  sideEffects: None
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - kube-public
          - kube-node-lease
          - kagenti-webhook-system
    matchLabels:
      # Only trigger webhook for namespaces that have opted-in
      # This aligns with the precedence evaluator Layer 3 which requires kagenti-enabled: true
      kagenti-enabled: "true"
  objectSelector:
    matchExpressions:
      - key: kagenti.io/type
        operator: In
        values:
          - agent
          - tool
      - key: kagenti.io/inject
        operator: NotIn
        values:
          - disabled
  rules:
  - operations:
    - CREATE
    apiGroups:
    - ""
    apiVersions:
    - v1
    resources:
    - pods

apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        kagenti.io/type: agent
    spec:
      initContainers:
      - name: config-init
        image: quay.io/aicatalyst/openclaw:latest
        command:
        - sh
        - -c
        - |
          openclaw config set gateway.bind lan &&
          openclaw config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true &&
          openclaw config set diagnostics.enabled true
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/node/.openclaw
      containers:
      - name: agent
        image: quay.io/aicatalyst/openclaw:latest
        ports:
        - containerPort: 18789
        env:
        - name: NODE_OPTIONS
          value: "--require /otel/otel-setup.js"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://mlflow-service.test.svc.cluster.local:5000"
        - name: OTEL_SERVICE_NAME
          value: "openclaw"
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/node/.openclaw
        - name: otel-tracing
          mountPath: /otel
      volumes:
      - name: openclaw-data
        emptyDir: {}
      - name: otel-tracing
        configMap:
          name: openclaw-otel-tracing
